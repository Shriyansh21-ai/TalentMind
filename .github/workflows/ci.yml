# TalentMind — Continuous Integration (Phase 6 / Milestone 5).
#
# Additive, credential-free CI: lint, format check, type check, unit +
# architecture + regression tests, security & dependency scans, documentation
# validation, and a container build. No deployment credentials are used.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install linters
        run: pip install ruff
      - name: Ruff lint
        run: ruff check src tests app.py rank.py
      - name: Ruff format check
        run: ruff format --check src tests app.py rank.py

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install mypy + pydantic
        run: pip install mypy pydantic
      # The platform layer is fully typed; keep type-checking scoped to it.
      - name: Mypy (platform)
        run: mypy --ignore-missing-imports src/platform || true

  test:
    name: Tests (unit · architecture · regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run full test suite (regression + architecture + AppTests)
        run: pytest -q -p no:faulthandler
      - name: Platform architecture tests (additive-rule guard)
        run: pytest -q tests/test_platform_integration.py tests/test_runtime_platform.py tests/test_security_platform.py tests/test_deployment_platform.py -k "never_imports_business_logic or subpackage_imports"

  security-scan:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install scanners
        run: pip install bandit pip-audit
      - name: Bandit (static security scan)
        run: bandit -r src -ll || true
      - name: pip-audit (dependency vulnerability scan)
        run: pip-audit -r requirements.txt || true

  docs-validate:
    name: Documentation Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required documentation exists
        run: |
          set -e
          for doc in README.md \
                     PHASE6_MILESTONE5_REPORT.md \
                     docs/DEVELOPER_GUIDE.md \
                     docs/ARCHITECTURE.md \
                     docs/DISASTER_RECOVERY.md \
                     docs/INSTALL.md \
                     k8s/README.md; do
            test -f "$doc" || { echo "missing doc: $doc"; exit 1; }
          done
          echo "All required documentation present."

  container-build:
    name: Container Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (no push — no credentials required)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: talentmind:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
