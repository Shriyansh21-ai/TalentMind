# TalentMind — Release workflow (Phase 6 / Milestone 5).
#
# Triggered on a semantic-version tag (v1.0.0). Verifies the tag, runs the full
# test suite, builds the container and packages release artifacts + notes. No
# registry credentials are configured — publishing steps are intentionally left
# as opt-in (add a registry login + push in your own fork/enterprise).
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release (e.g. 1.0.0)"
        required: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Full regression
        run: pytest -q -p no:faulthandler
      - name: Production readiness validation
        run: |
          python -c "from src.platform.deployment import build_deployment_platform; r = build_deployment_platform().validator.validate(); print('ready=%s score=%.2f' % (r.ready, r.score)); assert r.ready, 'not production ready'"

  package:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build release image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: talentmind:${{ github.ref_name }}
      - name: Generate release notes
        run: |
          python -c "from src.platform.deployment.release import ReleaseManager, ChangeEntry, ChangeType; m = ReleaseManager(); print(m.generate_release_notes('${{ github.ref_name }}', [ChangeEntry(change_type=ChangeType.FEATURE, summary='See docs/CHANGELOG.md for release details')]))" > RELEASE_NOTES.md
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: |
            RELEASE_NOTES.md
            docs/CHANGELOG.md
