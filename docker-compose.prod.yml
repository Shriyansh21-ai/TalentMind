# ---------------------------------------------------------------------------
# TalentMind — production override (Phase 6 / Milestone 5).
#
# Pins the production profile, applies resource limits and an always-on restart
# policy, and drops any source bind mounts.
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ---------------------------------------------------------------------------
services:
  talentmind:
    environment:
      TALENTMIND_ENV: production
      TALENTMIND_LOG_LEVEL: INFO
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
      restart_policy:
        condition: on-failure
        max_attempts: 3
        window: 120s
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
