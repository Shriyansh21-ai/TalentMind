# ClusterIP service fronting the app pods.
apiVersion: v1
kind: Service
metadata:
  name: talentmind
  namespace: talentmind
  labels:
    app.kubernetes.io/name: talentmind
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: talentmind
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
