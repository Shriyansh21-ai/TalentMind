# Horizontal Pod Autoscaler — scales on CPU and memory utilization.
# Aligns with the deployment platform's "production" profile (3–10 replicas).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: talentmind
  namespace: talentmind
  labels:
    app.kubernetes.io/name: talentmind
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: talentmind
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
