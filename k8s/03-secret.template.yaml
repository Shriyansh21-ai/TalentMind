# SECRET TEMPLATE — do NOT commit real values.
#
# Copy to a private location, fill in base64-encoded values, and apply out of
# band (or, preferably, source these from a real secret store — HashiCorp Vault,
# Azure Key Vault, AWS Secrets Manager, GCP Secret Manager — via the External
# Secrets Operator or CSI driver). TalentMind runs fully offline by default and
# requires NO secrets to boot; this template exists for production integrations.
apiVersion: v1
kind: Secret
metadata:
  name: talentmind-secrets
  namespace: talentmind
  labels:
    app.kubernetes.io/name: talentmind
type: Opaque
stringData:
  # Example placeholders — replace or remove. Never store real secrets in git.
  TALENTMIND_DB_URL: "REPLACE_ME"
  TALENTMIND_SMTP_PASSWORD: "REPLACE_ME"
